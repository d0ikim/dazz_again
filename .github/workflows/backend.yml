# GitHub Actions 백엔드 CI/CD 워크플로우
# 이 파일은 main 브랜치에 코드가 푸시될 때마다 자동으로 실행됨

# 워크플로우 이름 — GitHub 웹사이트의 Actions 탭에서 보여줌
name: Backend CI/CD

# 워크플로우를 실행하는 트리거 (언제 실행할 것인가?)
on:
  # push: 코드를 깃허브에 푸시했을 때 실행
  push:
    # branches: 어떤 브랜치에서만 실행할 것인가? (main 브랜치만)
    branches: [ main ]
    # paths: 어떤 파일이 변경되었을 때만 실행할 것인가? (backend/ 폴더만)
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

  # pull_request: PR이 만들어졌을 때도 실행 (코드 리뷰 전에 자동 테스트)
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

# 작업 정의 (jobs: 실제로 뭘 할 것인가?)
jobs:
  # build: 작업의 이름 (이 작업에서 빌드+테스트 함)
  build:
    # runs-on: 어디서 실행할 것인가? (ubuntu-latest = 리눅스 가상 서버)
    runs-on: ubuntu-latest

    # 작업이 실행할 단계들 (steps: 1단계, 2단계, ...)
    steps:
      # 1단계: 코드 다운로드
      # uses: GitHub에서 미리 만든 액션 사용 (actions/checkout@v4)
      # 이 액션은 저장소의 코드를 가상 서버에 복사해옴
      - name: Checkout code
        uses: actions/checkout@v4

      # 2단계: Java 21 설치
      # uses: Java를 설치하는 GitHub 공식 액션
      # java-version: Java 21을 설치하라는 뜻 (당신의 backend/build.gradle에서 Java 21 사용)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          # distribution: OpenJDK 종류 (temurin = 무료 버전)
          distribution: 'temurin'
          # cache: Maven/Gradle 라이브러리를 캐시 (다음번에 빨리 로드됨)
          cache: gradle

      # 3단계: Gradle 빌드 실행
      # run: 직접 명령어를 실행 (마치 터미널에서 입력하는 것처럼)
      # ./gradlew build: Gradle로 빌드 + 테스트 실행
      # --no-daemon: 백그라운드 프로세스 생성 안 함 (CI/CD 환경에서 권장)
      - name: Build and run tests with Gradle
        run: |
          cd backend
          ./gradlew build --no-daemon

        # env: 환경변수 설정 (Spring Boot의 .env를 대체)
        # GitHub Secrets를 사용해서 민감한 정보 보호 (API 키 등)
        env:
          # 실제 배포 시: GitHub Settings → Secrets에서 설정해야 함
          # 지금은 테스트 목적이므로 더미값 사용
          DB_DATABASE: dazz
          DB_USER: dazz_admin
          DB_PASSWORD: test_password
          KAKAO_CLIENT_ID: test_client_id
          KAKAO_CLIENT_SECRET: test_client_secret
          JWT_SECRET: test_jwt_secret_for_ci_cd_testing_only_32_chars_minimum
          JWT_EXPIRATION_MS: 3600000

      # 4단계: 빌드 성공 시 메시지 출력
      # 실제 배포 환경이라면, 여기서 jar 파일을 서버에 업로드하거나
      # Docker 이미지를 만들어서 배포함
      - name: Build succeeded
        if: success()
        run: echo "✅ Backend build and tests passed!"

      # 5단계: 빌드 실패 시 알림
      # if: failure() = 이전 단계가 실패했을 때만 실행
      # 실제로는 Slack/Discord/이메일 알림을 보낼 수 있음
      - name: Build failed
        if: failure()
        run: echo "❌ Backend build failed! Check the logs above."
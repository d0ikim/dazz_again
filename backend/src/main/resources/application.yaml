spring:
  application:
    name: dazz  # 이 서버의 이름

  datasource:
    # ${DB_HOST:localhost} : DB_HOST 환경변수가 있으면 그 값, 없으면 localhost 사용
    # 로컬 개발 땐 DB_HOST를 안 정해놨으니 지금까지처럼 localhost로 접속되고,
    # Render처럼 실제 서버에 올릴 땐 DB_HOST=Render가 알려준 DB 주소로 설정하면 그대로 연결됨
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_DATABASE}
    username: ${DB_USER}                         # DB 접속 계정은 환경변수로 관리
    password: ${DB_PASSWORD}                     # 비밀번호는 환경변수로 관리 (코드에 직접 쓰면 위험)
    driver-class-name: org.postgresql.Driver     # PostgreSQL 드라이버 사용

  jpa:
    hibernate:
      ddl-auto: update        # 서버 시작 시 @Entity 클래스 보고 테이블 자동 생성/변경 (데이터는 유지)
    show-sql: true            # 실행되는 SQL을 콘솔에 출력 (개발 중 확인용)
    properties:
      hibernate:
        format_sql: true      # 출력되는 SQL을 보기 좋게 정렬
        dialect: org.hibernate.dialect.PostgreSQLDialect  # PostgreSQL 문법으로 SQL 생성

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}           # 카카오 개발자 콘솔에서 발급받은 REST API 키
            client-secret: ${KAKAO_CLIENT_SECRET}   # 카카오 개발자 콘솔에서 발급받은 Client Secret
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"  # 카카오 로그인 후 돌아올 우리 서버 URL (자동 생성)
            authorization-grant-type: authorization_code       # OAuth2 표준 인증 방식
            client-authentication-method: client_secret_post   # 카카오는 client_id를 헤더가 아닌 POST 바디로 받음
            scope:
              - profile_nickname   # 카카오에 요청할 정보: 닉네임
              - profile_image      # 카카오에 요청할 정보: 프로필 이미지
        provider:
          kakao:                   # 카카오 서버 주소 모음 (Spring이 카카오와 통신할 때 사용)
            authorization-uri: https://kauth.kakao.com/oauth/authorize  # 카카오 로그인 화면 URL
            token-uri: https://kauth.kakao.com/oauth/token              # 카카오에서 토큰 받아오는 URL
            user-info-uri: https://kapi.kakao.com/v2/user/me            # 카카오에서 유저 정보 받아오는 URL
            user-name-attribute: id                                      # 카카오 응답에서 유저 고유값 키 이름

# 서버 설정 — spring: 블록과 같은 최상위 레벨에 있어야 함
# (spring: 블록 안에 넣으면 jpa/security 설정의 소속이 바뀌어 서버가 못 뜸)
server:
  # ${PORT:8080} : Render 같은 배포 환경은 PORT 환경변수로 "이 포트를 써라"라고 알려줌
  # 로컬에선 PORT를 안 정해놨으니 지금까지처럼 8080번 그대로 사용
  port: ${PORT:8080}

# JWT 설정
jwt:
  secret: ${JWT_SECRET}            # JWT 서명용 비밀 키 (64자 이상 권장, HS512 자동 적용)
  expiration-ms: ${JWT_EXPIRATION_MS}  # 토큰 유효시간 (밀리초 단위, 예: 3600000 = 1시간)